<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Confirme o registo</title>
</head>
<body style="font-family: system-ui, sans-serif; line-height: 1.5;">
    <h1 style="font-size: 1.25rem;">Olá, {{ username }}</h1>
    <p>A sua conta NutriPraxis foi criada. Para a ativar e poder entrar, use o botão abaixo (ou copie o endereço do link).</p>
    <p><a href="{{ link_ativacao }}" style="display:inline-block;padding:0.6rem 1rem;background:#2f6b4f;color:#fff;text-decoration:none;border-radius:6px;">Ativar a minha conta</a></p>
    <p style="font-size:0.875rem;color:#555;">Se o botão não funcionar, copie e cole no navegador:<br><span style="word-break:break-all;">{{ link_ativacao }}</span></p>
</body>
</html>
